services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartnews-backend
    restart: unless-stopped
    environment:
      PORT: 3000
      NEWS_API_KEY: ${NEWS_API_KEY}
      GUARDIAN_API_KEY: ${GUARDIAN_API_KEY}
      DB_HOST: host.docker.internal   # Sunucudaki PostgreSQL'e bağlan
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_MAX_CONNECTIONS: 20
      DB_IDLE_TIMEOUT_MS: 30000
      DB_CONNECTION_TIMEOUT_MS: 5000
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Linux'ta host IP'sini çözmek için
    # Backend sadece Docker ağı içinde erişilebilir, dışarı açılmıyor
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smartnews-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
